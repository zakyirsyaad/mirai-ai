server {
    listen 80;
    listen [::]:80;
    server_name mirai.43-129-56-85.sslip.io;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location = /health {
        return 308 https://$host$request_uri;
    }

    location / {
        default_type text/plain;
        return 426 "HTTPS required\n";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mirai.43-129-56-85.sslip.io;

    ssl_certificate /etc/letsencrypt/live/mirai.43-129-56-85.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mirai.43-129-56-85.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8797;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
