packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  msgpackr-extract: true
  prisma: true
  sharp: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - msgpackr-extract
  - sharp

# Force a single ioredis copy (BullMQ pins 5.10.1) so the Redis instance type
# stays cross-assignable between our code and BullMQ's connection option.
overrides:
  ioredis: "5.10.1"
